version: 2

builds:
  - main: ./cmd/toktap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - deploy/config/*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: toktap
    homepage: "https://github.com/voska/toktap"
    description: "Transparent proxy that taps LLM API traffic to extract token usage metrics"
    license: "MIT"
    repository:
      owner: voska
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: voska-bot
      email: bot@voska.dev
    install: |
      bin.install "toktap"
    test: |
      system "#{bin}/toktap", "--version"

dockers:
  - image_templates:
      - "ghcr.io/voska/toktap:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "ghcr.io/voska/toktap:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/voska/toktap:{{ .Version }}"
    image_templates:
      - "ghcr.io/voska/toktap:{{ .Version }}-amd64"
      - "ghcr.io/voska/toktap:{{ .Version }}-arm64"
  - name_template: "ghcr.io/voska/toktap:latest"
    image_templates:
      - "ghcr.io/voska/toktap:{{ .Version }}-amd64"
      - "ghcr.io/voska/toktap:{{ .Version }}-arm64"
